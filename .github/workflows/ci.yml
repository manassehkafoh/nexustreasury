name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  # Force all GitHub Actions JavaScript runners to use Node.js 24
  # Suppresses: 'Node.js 20 actions are deprecated' warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Setup & Cache ──────────────────────────────────────────
  setup:
    name: Install & Cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            pnpm install --frozen-lockfile
          else
            echo "::warning::pnpm-lock.yaml missing — generating (commit it!)"
            pnpm install --no-frozen-lockfile
          fi

      - name: Generate Prisma client (combined root schema)
        run: pnpm exec prisma generate --schema=prisma/schema.prisma

      - name: Verify build compiles
        run: pnpm build

      - name: Verify workspace packages
        run: pnpm list --recursive --depth=0

  # ── Lint ──────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client (combined root schema)
        run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - run: pnpm lint
      - run: pnpm exec prettier --check "**/*.{ts,tsx,yaml,md}" --ignore-path .prettierignore

  # ── Type Check ────────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client (combined root schema)
        run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - run: pnpm typecheck

  # ── Unit Tests ────────────────────────────────────────────
  test:
    name: Unit & Integration Tests
    needs: setup
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexustreasury_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexustreasury_test
      REDIS_HOST: localhost
      REDIS_PORT: '6379'
      JWT_SECRET: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client (combined root schema)
        run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - run: pnpm build
      - run: pnpm test:coverage
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── SAST ──────────────────────────────────────────────────
  sast:
    name: Static Application Security Testing
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: typescript
          queries: security-extended
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client (combined root schema)
        run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - run: pnpm build
      - uses: github/codeql-action/analyze@v4

  # ── SCA ───────────────────────────────────────────────────
  sca:
    name: Software Composition Analysis (Snyk)
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

  # ── Build Docker Images ───────────────────────────────────
  build-images:
    name: Build & Scan Docker Images
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for upload-sarif
    strategy:
      fail-fast: false
      matrix:
        service:
          - trade-service
          - position-service
          - risk-service
          - alm-service
          - bo-service
          - market-data-service
          - web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/setup-qemu-action@v4
      - name: Build image (linux/amd64 + load for Trivy scan)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/${{ matrix.service }}/Dockerfile
          # CI runner is linux/amd64. load:true requires single platform.
          # Multi-platform (amd64 + arm64) is built and pushed in cd-staging.yml.
          platforms: linux/amd64
          push: false
          load: true
          tags: nexustreasury/${{ matrix.service }}:${{ github.sha }}
          # GHA Docker layer cache removed: pnpm workspace packages are always
          # symlinks, but the GHA cache stored @nexustreasury/domain as a directory
          # from an older layer. BuildKit overlayfs cannot replace a cached directory
          # with a symlink → "cannot replace to directory with file".
          # Clean builds per CI run ensures no stale cache conflicts.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nexustreasury/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          # exit-code 0: scan runs and reports CVEs to GitHub Security tab
          # but does not block CI on unfixed upstream Alpine/OS vulnerabilities.
          # Change to '1' to hard-fail CI when actionable CVEs are found.
          exit-code: '0'
          ignore-unfixed: true
      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          wait-for-processing: true

  # ── E2E Tests ─────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    needs: build-images
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexustreasury_test
      JWT_SECRET: ci-e2e-secret
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexustreasury_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema=prisma/schema.prisma
      - name: Build web application (required for pnpm start)
        run: pnpm --filter @nexustreasury/domain build && pnpm --filter @nexustreasury/web build
      - name: Install Playwright browsers
        run: pnpm --filter @nexustreasury/web exec playwright install --with-deps chromium
      - name: Run E2E tests
        # playwright.config.ts webServer starts `pnpm start` and waits for
        # http://localhost:3000 to respond before running any test — no sleep needed
        run: pnpm --filter @nexustreasury/web test:e2e
        env:
          BASE_URL: http://localhost:3000
          JWT_SECRET: ci-e2e-secret
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: packages/web/playwright-report/
          retention-days: 7
