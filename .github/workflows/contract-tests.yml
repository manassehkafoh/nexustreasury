name: Contract Tests (Pact)

on:
  push:
    branches: [main, develop]
    paths:
      - 'packages/trade-service/**'
      - 'packages/risk-service/**'
      - 'tests/contract/**'
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  PACT_BROKER_BASE_URL: https://pact.nexustreasury.io
  # PACT_BROKER_TOKEN is stored in GitHub Secrets

# Least-privilege: read-only content access
permissions:
  contents: read
  actions: read

jobs:
  # ── Consumer: accounting-service ─────────────────────────────────────
  consumer-accounting:
    name: Consumer — accounting-service contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run Pact consumer tests (accounting-service)
        run: pnpm --filter @nexustreasury/accounting-service exec vitest run --config vitest.pact.config.ts
        env:
          PACT_OUTPUT_DIR: ./pacts
      - name: Publish pacts to Pact Broker
        if: github.ref == 'refs/heads/main'
        run: |
          npx @pact-foundation/pact-broker-cli publish \
            --pact-files-or-dirs=./pacts \
            --broker-base-url=${{ env.PACT_BROKER_BASE_URL }} \
            --broker-token=${{ secrets.PACT_BROKER_TOKEN }} \
            --consumer-app-version=${{ github.sha }} \
            --branch=${{ github.ref_name }}

  # ── Consumer: notification-service ───────────────────────────────────
  consumer-notification:
    name: Consumer — notification-service contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run Pact consumer tests (notification-service)
        run: pnpm --filter @nexustreasury/notification-service exec vitest run --config vitest.pact.config.ts
        env:
          PACT_OUTPUT_DIR: ./pacts
      - name: Publish pacts to Pact Broker
        if: github.ref == 'refs/heads/main'
        run: |
          npx @pact-foundation/pact-broker-cli publish \
            --pact-files-or-dirs=./pacts \
            --broker-base-url=${{ env.PACT_BROKER_BASE_URL }} \
            --broker-token=${{ secrets.PACT_BROKER_TOKEN }} \
            --consumer-app-version=${{ github.sha }} \
            --branch=${{ github.ref_name }}

  # ── Producer: trade-service ───────────────────────────────────────────
  provider-trade:
    name: Provider — trade-service satisfies all consumer contracts
    needs: [consumer-accounting, consumer-notification]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexustreasury_test
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexustreasury_test
      JWT_SECRET: pact-provider-test-secret-not-for-prod
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma migrate deploy --schema=prisma/schema.prisma
      - run: pnpm build
      - name: Verify trade-service satisfies published consumer pacts
        run: pnpm --filter @nexustreasury/trade-service exec vitest run --config vitest.pact.provider.config.ts
        env:
          PACT_BROKER_BASE_URL: ${{ env.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PROVIDER_VERSION: ${{ github.sha }}
          PROVIDER_BRANCH: ${{ github.ref_name }}

  # ── can-i-deploy gate ─────────────────────────────────────────────────
  can-i-deploy:
    name: can-i-deploy (production gate)
    needs: [provider-trade]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check trade-service can deploy to production
        run: |
          npx @pact-foundation/pact-broker-cli can-i-deploy \
            --pacticipant trade-service \
            --version ${{ github.sha }} \
            --to-environment production \
            --broker-base-url ${{ env.PACT_BROKER_BASE_URL }} \
            --broker-token ${{ secrets.PACT_BROKER_TOKEN }}
