name: Automated Security Patch Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours — SOC 2 CC6.8 compliance
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  audit-dependencies:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: |
          pnpm audit --json > audit-report.json || true
          CRITICAL=$(cat audit-report.json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(cat audit-report.json | jq '.metadata.vulnerabilities.high // 0')
          echo "Critical: $CRITICAL | High: $HIGH"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "CRITICAL_VULNERABILITIES=true" >> $GITHUB_ENV
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_id }}
          path: audit-report.json
          retention-days: 90   # SOC 2 audit evidence retention

  scan-images:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [trade-service, position-service, risk-service, alm-service, bo-service]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: packages/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: nexustreasury/${{ matrix.service }}:scan
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nexustreasury/${{ matrix.service }}:scan
          format: sarif
          output: ${{ matrix.service }}-trivy.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ matrix.service }}-trivy.sarif
          category: trivy-${{ matrix.service }}

  auto-patch:
    name: Auto-Merge Security Patches (Renovate)
    needs: [audit-dependencies, scan-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
      - name: Run Renovate Bot
        uses: renovatebot/github-action@v41
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: info
          RENOVATE_CONFIG_FILE: renovate.json

  generate-soc2-evidence:
    name: Generate SOC 2 CC6.8 Evidence
    needs: [audit-dependencies, scan-images]
    runs-on: ubuntu-latest
    steps:
      - name: Create compliance audit record
        run: |
          cat << EVIDENCE > soc2-cc6.8-evidence.json
          {
            "control": "CC6.8",
            "description": "Automated security patch management",
            "runId": "${{ github.run_id }}",
            "runAt": "$(date -u -Iseconds)",
            "triggeredBy": "scheduled",
            "services": ["trade-service", "position-service", "risk-service", "alm-service", "bo-service"],
            "scanTypes": ["dependency-audit", "container-scan"],
            "autoMergeEnabled": true,
            "maxPatchLatencyHours": 24
          }
          EVIDENCE
          echo "SOC 2 evidence record generated"
      - uses: actions/upload-artifact@v4
        with:
          name: soc2-evidence-${{ github.run_id }}
          path: soc2-cc6.8-evidence.json
          retention-days: 2555    # 7 years SOC 2 retention
