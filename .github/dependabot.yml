# NexusTreasury uses Renovate Bot (renovate.json) for ALL dependency management.
# Dependabot is fully disabled here to prevent duplicate PRs.
#
# Renovate handles:
#   - npm/pnpm packages  (open-pull-requests-limit: 0 below)
#   - GitHub Actions     (ecosystems added to renovate.json)
#   - Docker base images (pinDigests: true)
#   - Security patches auto-merged within 24h (SOC 2 CC6.8)
#
# If you need emergency Dependabot security alerts, re-enable via GitHub Security settings.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0   # DISABLED — Renovate handles npm
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 0   # DISABLED — Renovate handles GitHub Actions
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor", "version-update:semver-patch"]
