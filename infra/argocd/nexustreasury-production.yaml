apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexustreasury-production
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: nexustreasury
    environment: production
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/manassehkafoh/nexustreasury
    targetRevision: main
    path: infra/helm/nexustreasury
    helm:
      valueFiles:
        - values-production.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: nexus-prod
  syncPolicy:
    # Production requires manual sync approval — NO automated sync
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 2
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 10
