apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: nexus-staging

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: HorizontalPodAutoscaler
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

images:
  - name: ghcr.io/manassehkafoh/nexustreasury/trade-service
    newTag: staging
  - name: ghcr.io/manassehkafoh/nexustreasury/position-service
    newTag: staging
  - name: ghcr.io/manassehkafoh/nexustreasury/risk-service
    newTag: staging
  - name: ghcr.io/manassehkafoh/nexustreasury/alm-service
    newTag: staging
  - name: ghcr.io/manassehkafoh/nexustreasury/bo-service
    newTag: staging
  - name: ghcr.io/manassehkafoh/nexustreasury/web
    newTag: staging
