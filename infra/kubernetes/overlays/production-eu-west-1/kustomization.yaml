apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Primary region: eu-west-1 (London)
# Serves: EMEA trading hours (08:00–18:00 BST)
# Failover: Routes to us-east-1 if unhealthy

namespace: nexustreasury

resources:
  - ../../base

patches:
  # Production resource limits — higher than base for peak trading load
  - target: { kind: Deployment, name: trade-service }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
  - target: { kind: Deployment, name: risk-service }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target: { kind: Deployment, name: web }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

images:
  - name: ghcr.io/manassehkafoh/nexustreasury/trade-service
    newName: ghcr.io/manassehkafoh/nexustreasury/trade-service
    digest: '' # ArgoCD image-updater fills this from GHCR on each deploy
  - name: ghcr.io/manassehkafoh/nexustreasury/risk-service
    newName: ghcr.io/manassehkafoh/nexustreasury/risk-service

commonAnnotations:
  deployment.region: eu-west-1
  deployment.primary: 'true'
