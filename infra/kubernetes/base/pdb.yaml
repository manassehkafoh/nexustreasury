# PodDisruptionBudgets — ensure minimum available pods during node drain / rolling updates
# Prevents > 1 replica going down at a time for all production services.
# Critical for trading hours: disruptions must not impact P99 < 100ms SLA.
#
# Pattern: minAvailable = replicas - 1 (allows rolling update of 1 pod at a time)
# Services with minReplicas=2 get minAvailable=1
# Services with minReplicas=3+ get minAvailable=2

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: pdb-trade-service
  namespace: nexustreasury
spec:
  minAvailable: 2
  selector:
    matchLabels: { app: trade-service }
---
