apiVersion: apps/v1
kind: Deployment
metadata:
  name: bo-service
  namespace: nexus-prod
  labels:
    app: bo-service
    app.kubernetes.io/part-of: nexustreasury
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bo-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: bo-service
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9090'
        vault.hashicorp.com/agent-inject: 'true'
        vault.hashicorp.com/role: 'bo-service'
    spec:
      serviceAccountName: bo-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: bo-service
      containers:
        - name: bo-service
          image: ghcr.io/manassehkafoh/nexustreasury/bo-service:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 4005
            - name: metrics
              containerPort: 9090
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '4005'
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: nexus-config
                  key: kafka.brokers
            - name: OTEL_SERVICE_NAME
              value: bo-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.nexus-observability:4317
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 800m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4005
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4005
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: bo-service
  namespace: nexus-prod
spec:
  selector:
    app: bo-service
  ports:
    - name: http
      port: 80
      targetPort: 4005
    - name: metrics
      port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bo-service
  namespace: nexus-prod
  annotations:
    vault.hashicorp.com/role: bo-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bo-service-hpa
  namespace: nexus-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bo-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
