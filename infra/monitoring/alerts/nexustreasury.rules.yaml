groups:
  - name: nexustreasury.trading
    rules:
      - alert: TradeBookingLatencyHigh
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket{job="trade-service",route="/api/v1/trades",method="POST"}[5m]))
            by (le)
          ) > 0.1
        for: 2m
        labels:
          severity: warning
          team: treasury
        annotations:
          summary: 'Trade booking P99 latency above 100ms SLA'
          description: 'P99 booking latency is {{ $value | humanizeDuration }}. SLA target < 100ms.'
          runbook: 'https://wiki.nexustreasury.com/runbooks/trade-latency'

      - alert: TradeServiceErrorRateHigh
        expr: |
          sum(rate(http_requests_total{job="trade-service",status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="trade-service"}[5m])) > 0.01
        for: 1m
        labels:
          severity: critical
          team: treasury
        annotations:
          summary: 'Trade Service error rate above 1%'
          description: 'Error rate: {{ $value | humanizePercentage }}. Investigate immediately.'

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag{topic="nexus.trading.trades"} > 1000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: 'High Kafka consumer lag on trading topic'
          description: 'Consumer lag: {{ $value }} messages. position-service may be falling behind.'

  - name: nexustreasury.alm
    rules:
      - alert: LCRBelowMinimum
        expr: nexus_alm_lcr_ratio < 100
        for: 0m
        labels:
          severity: critical
          team: treasury
          regulatory: 'true'
        annotations:
          summary: 'LCR below regulatory minimum of 100%'
          description: 'LCR: {{ $value }}%. Immediate action required. Notify ALM desk and Risk.'
          runbook: 'https://wiki.nexustreasury.com/runbooks/lcr-breach'

      - alert: LCRApproachingThreshold
        expr: nexus_alm_lcr_ratio < 115
        for: 15m
        labels:
          severity: warning
          team: treasury
        annotations:
          summary: 'LCR approaching management buffer threshold (115%)'
          description: 'LCR: {{ $value }}%. Management buffer at risk.'

      - alert: NSFRBelowMinimum
        expr: nexus_alm_nsfr_ratio < 100
        for: 0m
        labels:
          severity: critical
          team: treasury
          regulatory: 'true'
        annotations:
          summary: 'NSFR below regulatory minimum of 100%'
          description: 'NSFR: {{ $value }}%. Regulatory breach — notify Risk and Finance immediately.'

  - name: nexustreasury.risk
    rules:
      - alert: LimitBreachDetected
        expr: nexus_risk_limit_breaches_total > 0
        for: 0m
        labels:
          severity: critical
          team: risk
        annotations:
          summary: 'Active limit breach detected'
          description: '{{ $value }} active limit breach(es). Notify Risk Manager immediately.'

  - name: nexustreasury.security
    rules:
      - alert: AuthFailureSpike
        expr: |
          sum(rate(http_requests_total{status="401"}[5m])) > 10
        for: 2m
        labels:
          severity: warning
          team: security
        annotations:
          summary: 'Spike in authentication failures'
          description: '{{ $value }} auth failures/sec. Possible brute-force or misconfigured client.'

      - alert: CriticalCVEFound
        expr: nexus_security_trivy_vulnerabilities{severity="CRITICAL"} > 0
        for: 0m
        labels:
          severity: critical
          team: security
        annotations:
          summary: 'Critical CVE detected in container image'
          description: '{{ $value }} critical CVE(s) found. Renovate Bot should auto-patch within 24h.'

  - name: nexustreasury.platform
    rules:
      - alert: ServiceDown
        expr: up{job=~"trade-service|position-service|risk-service|alm-service|bo-service"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: 'NexusTreasury service is down'
          description: '{{ $labels.job }} has been unreachable for 1 minute.'
          runbook: 'https://wiki.nexustreasury.com/runbooks/service-down'

      - alert: PodRestartingFrequently
        expr: |
          increase(kube_pod_container_status_restarts_total{namespace="nexus-prod"}[1h]) > 3
        for: 0m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: 'Pod restarting frequently'
          description: '{{ $labels.pod }} has restarted {{ $value }} times in the last hour.'
